{% extends "base.html" %}

{% block content %}



<div class="flex-col h-full p-4 sm:ml-64 mt-16">
    <div class="flex flex-row h-96 bg-white">
        <div class="rounded-lg overflow-y-hidden w-1/2 m-2 border-orange-500">
            <div class="">
                <div>
                    <p class="font-bold bg-orange-100 px-6 py-2">공지사항</p>
                </div>    
                <table class="table-auto w-full text-sm text-left text-gray-500 dark:text-gray-400">
                    <thead class="text-xs text-gray-700 uppercase bg-gray-50 dark:bg-gray-700 dark:text-gray-400">
                        <tr>
                            <th scope="col" class="px-6 py-3">내용</th>
                            <th scope="col" class="px-6 py-3">날짜</th>
                            <th scope="col" class="px-6 py-3">작성자</th>
                        </tr>
                    </thead>
                    <tbody>
                        {% if post_list %}
                        {% for post in post_list %}
                        <tr class="text-xs bg-white border-b dark:bg-gray-800 dark:border-gray-700">
                            <td class="px-6 py-2">{{ post.subject }}</td>
                            <td class="px-6 py-2">{{ post.create_date|date:"Y-m-d" }}</td>
                            <td class="px-6 py-2">{{ post.author }}</td>
                        </tr>
                        {% endfor %}
                        {% endif %}
                    </tbody>
                </table>
            </div>
        </div>
        <div class="w-1/2 m-2 bg-slate-400"></div>
    </div>
    <div class="flex flex-row h-96 bg-white border-orange-500">
        <div class="w-1/2 m-2 bg-slate-400"></div>
        <div class="w-1/2 m-2 bg-slate-400"></div>
    </div>    
    <div class="flex flex-row h-96 bg-white border-orange-500">
        <div class="w-1/2 m-2 bg-slate-400"></div>
        <div class="w-1/2 m-2 bg-slate-400"></div>
    </div>    
    <div class="flex flex-row h-96 bg-white border-orange-500">
        <div class="w-1/2 m-2 bg-slate-400"></div>
        <div class="w-1/2 m-2 bg-slate-400"></div>
    </div>    
    <div class="flex flex-row h-96 bg-white border-orange-500">
        <div class="w-1/2 m-2 bg-slate-400"></div>
        <div class="w-1/2 m-2 bg-slate-400"></div>
    </div>
</div>

{% endblock content %}
